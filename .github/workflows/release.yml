name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v0.1.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Hunspell (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libhunspell-dev

      - name: Download Hunspell dictionaries
        run: |
          mkdir -p src/assets
          curl -fsSL -o src/assets/en_US.aff https://cgit.freedesktop.org/libreoffice/dictionaries/plain/en/en_US.aff
          curl -fsSL -o src/assets/en_US.dic https://cgit.freedesktop.org/libreoffice/dictionaries/plain/en/en_US.dic

      - name: Build release binary
        run: cargo build --release

      - name: Package binary and dictionaries
        run: |
          mkdir -p dist/git-spellcheck
          cp target/release/git-spellcheck dist/git-spellcheck/
          cp src/assets/en_US.* dist/git-spellcheck/
          cd dist
          zip -r git-spellcheck-${{ matrix.os }}-${{ matrix.arch }}.zip git-spellcheck

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-spellcheck-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/git-spellcheck-${{ matrix.os }}-${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install GitHub CLI
        uses: cli/gh-action@v2

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifact

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" --title "Release $TAG" --notes-file CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          TAG: ${{ github.ref_name }}

      - name: Upload all ZIPs to release
        run: |
          for file in ./artifact/*/*.zip; do
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          TAG: ${{ github.ref_name }}
